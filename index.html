<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adokva — Living Planet</title>
 
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
 
body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#02040f;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}
 
/* Космос */
.space{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.25) 1px, transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,.18) 1px, transparent 2px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,.15) 1px, transparent 2px),
        radial-gradient(circle at 90% 70%, rgba(255,255,255,.2) 1px, transparent 2px),
        linear-gradient(to bottom, #01030a, #030617 60%, #050a1f);
    background-size:120px 120px, 180px 180px, 150px 150px, 220px 220px, 100% 100%;
}
 
/* Млечный путь */
.milkyway{
    position:absolute;
    width:140%;
    height:220px;
    top:15%;
    left:-20%;
    transform:rotate(-15deg);
    background:radial-gradient(
        ellipse at center,
        rgba(255,255,255,.18) 0%,
        rgba(150,180,255,.12) 30%,
        rgba(120,100,255,.08) 50%,
        rgba(255,255,255,0) 75%
    );
    filter:blur(22px);
}
 
/* Логотип */
.logo{
    position:absolute;
    top:30px;
    left:30px;
    z-index:10;
}
 
.logo h1{
    font-size:36px;
    letter-spacing:6px;
    color:#ffffff;
}
 
.logo p{
    font-size:13px;
    opacity:.75;
    margin-top:6px;
}
 
/* Земля */
.earth-wrap{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
 
.earth{
    width:360px;
    height:360px;
    border-radius:50%;
    background:
        url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg');
    background-size:cover;
    box-shadow:
        0 0 70px rgba(0,140,255,.75),
        inset -90px -30px 120px rgba(0,0,0,.85);
    animation:spin 30s linear infinite;
    position:relative;
}
 
.earth::after{
    content:'';
    position:absolute;
    inset:-10px;
    border-radius:50%;
    background:radial-gradient(circle, transparent 65%, rgba(80,170,255,.28) 100%);
}
 
/* Луна */
.moon{
    position:absolute;
    width:72px;
    height:72px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #f5f5f5, #9e9e9e);
    top:22%;
    right:16%;
    box-shadow:0 0 28px rgba(255,255,255,.85);
}
 
/* Поиск */
.search{
    position:absolute;
    bottom:45px;
    left:50%;
    transform:translateX(-50%);
    width:min(88%, 460px);
    z-index:20;
}
 
.search input{
    width:100%;
    padding:16px 24px;
    border:none;
    outline:none;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    color:white;
    font-size:16px;
    text-align:center;
    border:1px solid rgba(255,255,255,.18);
}
 
.search input::placeholder{
    color:rgba(255,255,255,.75);
}
 
/* Подпись */
.footer{
    position:absolute;
    bottom:12px;
    width:100%;
    text-align:center;
    font-size:12px;
    opacity:.55;
}
 
/* Анимация */
@keyframes spin{
    from{
        background-position:0 0;
    }
    to{
        background-position:720px 0;
    }
}
 
/* Мобильные */
@media(max-width:768px){
 
    .logo{
        left:20px;
        top:20px;
    }
 
    .logo h1{
        font-size:30px;
    }
 
    .earth{
        width:280px;
        height:280px;
    }
 
    .moon{
        width:54px;
        height:54px;
        top:18%;
        right:8%;
    }
}
</style>
</head>
 
<body>
 
<div class="space"></div>
<div class="milkyway"></div>
 
<div class="logo">
    <h1>ADOKVA</h1>
    <p>Где бы ты ни был — земляки рядом</p>
</div>
 
<div class="earth-wrap">
    <div class="earth"></div>
</div>
 
<div class="moon"></div>
 
<div class="search">
    <input type="text" placeholder="🔍 Найти земляков на планете">
</div>
 
<div class="footer">
    ADOKVA • Living Planet v0.1
</div>
 
</body>
</html>
